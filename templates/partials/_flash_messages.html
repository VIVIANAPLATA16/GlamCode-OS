{% with mensajes = get_flashed_messages(with_categories=true) %}
  {% if mensajes %}
    <div class="flash-container" aria-live="polite">
      {% for category, message in mensajes %}
        <div class="alert alert--{{ category }}">
          <span>{{ message }}</span>
          <button type="button" class="alert__close" aria-label="Cerrar alerta">&times;</button>
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}
