<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlamCode OS - Peluquería</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<header>
    <h1>GLAMCODE OS</h1>
    <nav>
        <a href="{{ url_for('inicio') }}">Dashboard</a>
        <a href="{{ url_for('clientes') }}">Clientes</a>
        <a href="{{ url_for('servicios') }}">Servicios</a>
        <a href="{{ url_for('citas') }}">Citas</a>

        {% if session.get('rol') == 'admin' %}
        <a href="{{ url_for('crear_estilista') }}" style="color: #000; background: #c5a059; padding: 4px 10px; border-radius: 4px; font-weight: bold; margin-left: 10px;">
            EQUIPO
        </a>
        {% endif %}

        {% if session.get('usuario_id') %}
        <a href="{{ url_for('logout') }}" style="color: #ff4444; margin-left: 15px;">Cerrar Sesión</a>
        {% endif %}
    </nav>
</header>

<main>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</main>

<footer>
    © 2026 GlamCode - Luxury Hair System
</footer>

</body>
</html>
