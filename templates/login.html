{% extends 'layouts/auth_base.html' %}

{% block title %}Login | GlamCode OS{% endblock %}

{% block content %}
    <h2 class="card__title" style="margin-bottom: 2rem; text-align: center; letter-spacing: 1px;">
        Acceso a tu Negocio
    </h2>

    <form method="POST">
        <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input id="email" type="email" name="email" placeholder="tucorreo@ejemplo.com" required autocomplete="email">
        </div>

        <div class="form-group">
            <label for="password">Contraseña</label>
            <input id="password" type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn--primary w-100" style="margin-top: 1rem;">
            Ingresar
        </button>
    </form>

    <div class="login-footer" style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem;">
        <p style="color: #888;">¿Aún no tienes cuenta? 
            <a href="{{ url_for('auth.registro') }}" style="color: #D4AF37; text-decoration: none; font-weight: bold;">
                Regístrate aquí
            </a>
        </p>
    </div>
{% endblock %}
