{% extends 'layouts/auth_base.html' %}

{% block title %}Login | GlamCode OS{% endblock %}

{% block content %}
    <h2 class="card__title" style="margin-bottom: 1.5rem;">Ingresar al sistema</h2>

    <form method="POST">
        <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input id="email" type="email" name="email" placeholder="ejemplo@correo.com" required autocomplete="email">
        </div>

        <div class="form-group">
            <label for="password">Contraseña</label>
            <input id="password" type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn--primary w-100">
            Ingresar
        </button>
    </form>

    <div class="login-footer" style="margin-top: 1rem; text-align: center; font-size: 0.9rem;">
        <p>¿No tienes cuenta?
            <a href="{{ url_for('auth.registro') }}">Crear cuenta</a>
        </p>
    </div>
{% endblock %}
