{% extends 'layouts/auth_base.html' %}

{% block title %}Login | GlamCode OS{% endblock %}

{% block content %}
    <div style="text-align: center; margin-bottom: 1.5rem;">
        <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo GlamCode" style="width: 120px; height: auto;">
    </div>

    <h2 class="card__title" style="margin-bottom: 1.5rem; text-align: center;">Acceso a tu Negocio</h2>

    <form method="POST">
        <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input id="email" type="email" name="email" placeholder="tucorreo@ejemplo.com" required autocomplete="email">
        </div>

        <div class="form-group">
            <label for="password">Contraseña</label>
            <input id="password" type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn--primary w-100">
            Ingresar
        </button>
    </form>

    <div class="login-footer" style="margin-top: 1rem; text-align: center; font-size: 0.9rem;">
        <p>¿Aún no tienes cuenta?
            <a href="{{ url_for('auth.registro') }}">Regístrate aquí</a>
        </p>
    </div>
{% endblock %}
