{% extends 'base.html' %}

{% block content %}

<h2>Citas</h2>

<form method="POST">

    <label>Nombre del cliente</label>
    <input type="text" name="cliente" required>

    <label>Servicio</label>
    <input type="text" name="servicio" required>

    <label>Fecha</label>
    <input type="date" name="fecha" required>

    <button type="submit">Agendar Cita</button>

</form>

<br><br>

<table border="1">

<thead>
<tr>
<th>ID</th>
<th>Cliente</th>
<th>Servicio</th>
<th>Fecha</th>
</tr>
</thead>

<tbody>

{% for cita in citas %}

<tr>
<td>{{ cita[0] }}</td>
<td>{{ cita[1] }}</td>
<td>{{ cita[2] }}</td>
<td>{{ cita[3] }}</td>
</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
