{% extends "base.html" %}
{% block content %}
<div style="text-align: center; padding: 20px;">
    <h2 style="color: #c5a059;">Gestión de Citas</h2>
    
    <div style="max-width: 400px; margin: 0 auto 40px auto; border: 1px solid #c5a059; padding: 20px; border-radius: 10px; background: #000; color: #fff;">
        <h3 style="color: #c5a059;">Agendar Nueva Cita</h3>
        <form method="POST">
            <div style="margin-bottom: 15px; text-align: left;">
                <label>Nombre del cliente</label>
                <input type="text" name="cliente" style="width: 100%; padding: 8px; margin-top: 5px;" required>
            </div>
            <div style="margin-bottom: 15px; text-align: left;">
                <label>Servicio</label>
                <input type="text" name="servicio" style="width: 100%; padding: 8px; margin-top: 5px;" required>
            </div>
            <div style="margin-bottom: 20px; text-align: left;">
                <label>Fecha</label>
                <input type="date" name="fecha" style="width: 100%; padding: 8px; margin-top: 5px;" required>
            </div>
            <button type="submit" style="width: 100%; padding: 10px; background: #c5a059; color: #000; font-weight: bold; border: none; cursor: pointer;">Agendar Cita</button>
        </form>
    </div>

    <table style="width: 100%; color: #fff; border-collapse: collapse;">
        <thead>
            <tr style="color: #c5a059; border-bottom: 2px solid #c5a059;">
                <th>ID</th>
                <th>Cliente</th>
                <th>Servicio</th>
                <th>Fecha</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for cita in citas %}
            <tr style="border-bottom: 1px solid #333;">
                <td>{{ cita[0] }}</td>
                <td>{{ cita[1] }}</td>
                <td>{{ cita[2] }}</td>
                <td>{{ cita[3] }}</td>
                <td>
                    <a href="{{ url_for('editar_cita', id=cita[0]) }}" style="color: #c5a059; text-decoration: none;">Editar</a> | 
                    <a href="{{ url_for('delete_cita', id=cita[0]) }}" style="color: #c5a059; text-decoration: none;" onclick="return confirm('¿Borrar?')">Eliminar</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
