{% extends "base.html" %}
{% block content %}
<div class="container py-5">
    <h2 class="text-center mb-5" style="color: #c5a059; font-family: 'Playfair Display', serif; font-weight: bold;">Gestión de Citas</h2>
    
    <div class="row justify-content-center mb-5">
        <div class="col-12 col-md-6 col-lg-5">
            <div class="card bg-dark text-white shadow" style="border: 2px solid #c5a059; border-radius: 15px;">
                <div class="card-body p-4">
                    <h4 class="card-title text-center mb-4" style="color: #c5a059;">Agendar Nueva Cita</h4>
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Nombre del cliente</label>
                            <input type="text" name="cliente" class="form-control bg-dark text-white border-secondary shadow-sm" style="border-radius: 8px;" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Servicio</label>
                            <input type="text" name="servicio" class="form-control bg-dark text-white border-secondary shadow-sm" style="border-radius: 8px;" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Fecha</label>
                            <input type="date" name="fecha" class="form-control bg-dark text-white border-secondary shadow-sm" style="border-radius: 8px;" required>
                        </div>
                        <button type="submit" class="btn w-100 py-2" style="background-color: #c5a059; color: black; font-weight: bold; border-radius: 8px; transition: 0.3s;">
                            Agendar Cita
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-dark table-hover border-secondary text-center mt-3 shadow">
            <thead>
                <tr style="color: #c5a059; font-size: 1.1rem; border-bottom: 2px solid #c5a059;">
                    <th class="py-3">ID</th>
                    <th class="py-3">Cliente</th>
                    <th class="py-3">Servicio</th>
                    <th class="py-3">Fecha</th>
                    <th class="py-3">Acciones</th>
                </tr>
            </thead>
            <tbody class="align-middle">
                {% for cita in citas %}
                <tr style="border-bottom: 1px solid rgba(197, 160, 89, 0.2);">
                    <td>{{ cita[0] }}</td>
                    <td>{{ cita[1] }}</td>
                    <td>{{ cita[2] }}</td>
                    <td>{{ cita[3] }}</td>
                    <td>
                        <a href="{{ url_for('editar_cita', id=cita[0]) }}" class="btn btn-sm" style="color: #c5a059; font-weight: 500;">Editar</a>
                        <span style="color: #c5a059; opacity: 0.5;">|</span>
                        <a href="{{ url_for('delete_cita', id=cita[0]) }}" class="btn btn-sm" style="color: #c5a059; font-weight: 500;" onclick="return confirm('¿Eliminar esta cita?')">Eliminar</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
