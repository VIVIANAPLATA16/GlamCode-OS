{% extends 'layouts/auth_base.html' %}

{% block title %}Recuperar acceso | GlamCode OS{% endblock %}

{% block content %}
    <h2 class="card__title" style="margin-bottom: 0.5rem; text-align: center; letter-spacing: 1px;">
        Recuperar acceso
    </h2>
    <p style="color:#888; text-align:center; font-size:0.9rem; margin-bottom:2rem;">
        Ingresa tu correo y notificaremos al administrador.
    </p>

    <form method="POST">
        <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input id="email" type="email" name="email"
                   placeholder="tucorreo@ejemplo.com" required autocomplete="email">
        </div>
        <button type="submit" class="btn btn--primary w-100" style="margin-top: 1rem;">
            Solicitar recuperación
        </button>
    </form>

    <div style="text-align:center; margin-top:1.5rem;">
        <a href="{{ url_for('auth.login') }}"
           style="color:#c5a059; text-decoration:none; font-size:0.9em;">
            ← Volver al login
        </a>
    </div>
{% endblock %}
