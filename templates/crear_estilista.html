{% extends 'base.html' %}

{% block content %}
<h2 style="color: #c5a059; text-align: center; margin-bottom: 30px;">Registrar Nuevo Colaborador</h2>

<div style="display: flex; justify-content: center;">
    <div style="width: 100%; max-width: 400px; border: 1px solid #c5a059; padding: 25px; border-radius: 10px; background: #000; color: white;">
        <form method="POST">
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; color: #ccc;">Nombre del Estilista</label>
                <input type="text" name="peluqueria" placeholder="Ej: Juan Barbero" style="width: 100%; padding: 10px; background: #111; border: 1px solid #333; color: white; border-radius: 5px;" required>
            </div>
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px; color: #ccc;">Correo de Acceso</label>
                <input type="email" name="email" placeholder="juan@glamcode.com" style="width: 100%; padding: 10px; background: #111; border: 1px solid #333; color: white; border-radius: 5px;" required>
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px; color: #ccc;">Contraseña Temporal</label>
                <input type="password" name="password" style="width: 100%; padding: 10px; background: #111; border: 1px solid #333; color: white; border-radius: 5px;" required>
            </div>
            <button type="submit" style="width: 100%; padding: 12px; background: #c5a059; color: black; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">
                Crear Cuenta de Empleado
            </button>
        </form>
    </div>
</div>
{% endblock %}
