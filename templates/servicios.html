{% extends 'base.html' %}

{% block content %}
<h2 class="text-center" style="color: #c5a059; margin-bottom: 30px; text-align: center;">Gestión de Servicios</h2>

<div style="display: flex; justify-content: center; margin-bottom: 40px;">
    <div style="width: 100%; max-width: 450px; border: 1px solid #c5a059; padding: 25px; border-radius: 10px; background: #000; color: white;">
        <h3 style="color: #c5a059; text-align: center; margin-top: 0;">Nuevo Servicio</h3>
        <form method="POST">
            <div style="margin-bottom: 15px;">
                <label style="display: block; margin-bottom: 5px;">Nombre del servicio</label>
                <input type="text" name="nombre" style="width: 100%; padding: 8px; background: #111; border: 1px solid #333; color: white; border-radius: 5px;" required>
            </div>
            <div style="margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 5px;">Precio</label>
                <input type="number" name="precio" style="width: 100%; padding: 8px; background: #111; border: 1px solid #333; color: white; border-radius: 5px;" required>
            </div>
            <button type="submit" style="width: 100%; padding: 10px; background: #c5a059; color: black; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">
                Agregar Servicio
            </button>
        </form>
    </div>
</div>

<div style="overflow-x: auto;">
    <table style="width: 100%; border-collapse: collapse; text-align: center; color: white; border: 1px solid #c5a059;">
        <thead>
            <tr style="color: #c5a059; border-bottom: 2px solid #c5a059;">
                <th style="padding: 15px;">ID</th>
                <th style="padding: 15px;">Servicio</th>
                <th style="padding: 15px;">Precio</th>
                <th style="padding: 15px;">Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for servicio in servicios %}
            <tr style="border-bottom: 1px solid #222;">
                <td style="padding: 12px;">{{ servicio[0] }}</td>
                <td style="padding: 12px;">{{ servicio[1] }}</td>
                <td style="padding: 12px;">${{ "{:,.0f}".format(servicio[2]) }}</td>
                <td style="padding: 12px;">
                    <a href="{{ url_for('delete_servicio', id=servicio[0]) }}" 
                       style="color: #c5a059; text-decoration: none; font-size: 0.9em;" 
                       onclick="return confirm('¿Eliminar servicio?')">Eliminar</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
