{% extends 'layouts/auth_base.html' %}

{% block title %}Registro | GlamCode OS{% endblock %}

{% block content %}
  <h2 class="card__title" style="margin-bottom: 1.5rem;">Crear cuenta de negocio</h2>

  <form method="POST">
    <div class="form-group">
      <label for="peluqueria">Nombre de tu negocio</label>
      <input id="peluqueria" type="text" name="peluqueria" placeholder="Ej: Mi Salón Glam" required>
    </div>
    <div class="form-group">
      <label for="email">Correo electrónico</label>
      <input id="email" type="email" name="email" placeholder="tucorreo@ejemplo.com" required>
    </div>
    <div class="form-group">
      <label for="password">Contraseña</label>
      <input id="password" type="password" name="password" placeholder="Mínimo 8 caracteres" required>
    </div>
    <button type="submit" class="btn btn--primary w-100">Crear cuenta</button>
  </form>

  <div class="login-footer" style="margin-top: 1rem; text-align: center; font-size: 0.9rem;">
    <p>¿Ya tienes cuenta?
      <a href="{{ url_for('auth.login') }}">Iniciar sesión</a>
    </p>
  </div>
{% endblock %}
